                # for table sdns
                if self.doorbell_info.get("SDNS_IP_PORTS", []):
                    for ip, port in zip(self.doorbell_info.get("SDNS_IP_ADDRESSES", []), self.doorbell_info.get("SDNS_IP_PORTS", [])):
