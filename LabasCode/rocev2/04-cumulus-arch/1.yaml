name: rocev2-cumulus
prefix: ""
topology:
  nodes:
    # ===== Spine Switches (AS 65000) =====
    s1:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/s1.conf:/etc/startup.conf

    s2:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/s2.conf:/etc/startup.conf

    s3:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/s3.conf:/etc/startup.conf

    s4:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/s4.conf:/etc/startup.conf

    # ===== Leaf Switches (AS 65101-65108) =====
    l1:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l1.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.1.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.1.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.1.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.1.7/31 dev swp8
        - ip link set swp8 up

    l2:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l2.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.2.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.2.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.2.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.2.7/31 dev swp8
        - ip link set swp8 up

    l3:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l3.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.3.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.3.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.3.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.3.7/31 dev swp8
        - ip link set swp8 up

    l4:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l4.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.4.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.4.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.4.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.4.7/31 dev swp8
        - ip link set swp8 up

    l5:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l5.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.5.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.5.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.5.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.5.7/31 dev swp8
        - ip link set swp8 up

    l6:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l6.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.6.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.6.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.6.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.6.7/31 dev swp8
        - ip link set swp8 up

    l7:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l7.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.7.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.7.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.7.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.7.7/31 dev swp8
        - ip link set swp8 up

    l8:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
      - frr/l8.conf:/etc/startup.conf
      exec:
        - sysctl -w net.ipv4.fib_multipath_hash_policy=1
        - sysctl -w net.ipv6.fib_multipath_hash_policy=1

        - ip addr add 10.1.8.1/31 dev swp5
        - ip link set swp5 up
        - ip addr add 10.1.8.3/31 dev swp6
        - ip link set swp6 up
        - ip addr add 10.1.8.5/31 dev swp7
        - ip link set swp7 up
        - ip addr add 10.1.8.7/31 dev swp8
        - ip link set swp8 up

    # ===== Servers =====
    su1-n1:
      kind: linux
      image: 192.168.2.100:5000/nettool
      exec:
        - ip addr add 10.1.1.0/31 dev eth1
        - ip link set eth1 up
        - ip addr add 10.1.2.0/31 dev eth2
        - ip link set eth2 up
        - ip addr add 10.1.3.0/31 dev eth3
        - ip link set eth3 up
        - ip addr add 10.1.4.0/31 dev eth4
        - ip link set eth4 up
        - ip addr add 10.1.5.0/31 dev eth5
        - ip link set eth5 up
        - ip addr add 10.1.6.0/31 dev eth6
        - ip link set eth6 up
        - ip addr add 10.1.7.0/31 dev eth7
        - ip link set eth7 up
        - ip addr add 10.1.8.0/31 dev eth8
        - ip link set eth8 up
        
        # Rail1:
        - ip route add default via 10.1.1.1 dev eth1 table 1
        - ip rule add from 10.1.1.0/31 table 1
        # Rail2:
        - ip route add default via 10.1.2.1 dev eth2 table 2
        - ip rule add from 10.1.2.0/31 table 2
        # Rail3:
        - ip route add default via 10.1.3.1 dev eth3 table 3
        - ip rule add from 10.1.3.0/31 table 3
        # Rail4:
        - ip route add default via 10.1.4.1 dev eth4 table 4
        - ip rule add from 10.1.4.0/31 table 4
        # Rail5:
        - ip route add default via 10.1.5.1 dev eth5 table 5
        - ip rule add from 10.1.5.0/31 table 5
        # Rail6:
        - ip route add default via 10.1.6.1 dev eth6 table 6
        - ip rule add from 10.1.6.0/31 table 6
        # Rail7:
        - ip route add default via 10.1.7.1 dev eth7 table 7
        - ip rule add from 10.1.7.0/31 table 7
        # Rail8:
        - ip route add default via 10.1.8.1 dev eth8 table 8
        - ip rule add from 10.1.8.0/31 table 8

    su1-n2:
      kind: linux
      image: 192.168.2.100:5000/nettool
      exec:
        - ip addr add 10.1.1.2/31 dev eth1
        - ip link set eth1 up
        - ip addr add 10.1.2.2/31 dev eth2
        - ip link set eth2 up
        - ip addr add 10.1.3.2/31 dev eth3
        - ip link set eth3 up
        - ip addr add 10.1.4.2/31 dev eth4
        - ip link set eth4 up
        - ip addr add 10.1.5.2/31 dev eth5
        - ip link set eth5 up
        - ip addr add 10.1.6.2/31 dev eth6
        - ip link set eth6 up
        - ip addr add 10.1.7.2/31 dev eth7
        - ip link set eth7 up
        - ip addr add 10.1.8.2/31 dev eth8
        - ip link set eth8 up
        
        - ip route add default via 10.1.1.3 dev eth1 table 1
        - ip rule add from 10.1.1.2/31 table 1
        - ip route add default via 10.1.2.3 dev eth2 table 2
        - ip rule add from 10.1.2.2/31 table 2
        - ip route add default via 10.1.3.3 dev eth3 table 3
        - ip rule add from 10.1.3.2/31 table 3
        - ip route add default via 10.1.4.3 dev eth4 table 4
        - ip rule add from 10.1.4.2/31 table 4
        - ip route add default via 10.1.5.3 dev eth5 table 5
        - ip rule add from 10.1.5.2/31 table 5
        - ip route add default via 10.1.6.3 dev eth6 table 6
        - ip rule add from 10.1.6.2/31 table 6
        - ip route add default via 10.1.7.3 dev eth7 table 7
        - ip rule add from 10.1.7.2/31 table 7
        - ip route add default via 10.1.8.3 dev eth8 table 8
        - ip rule add from 10.1.8.2/31 table 8

    su2-n3:
      kind: linux
      image: 192.168.2.100:5000/nettool
      exec:
        - ip addr add 10.1.1.4/31 dev eth1
        - ip link set eth1 up
        - ip addr add 10.1.2.4/31 dev eth2
        - ip link set eth2 up
        - ip addr add 10.1.3.4/31 dev eth3
        - ip link set eth3 up
        - ip addr add 10.1.4.4/31 dev eth4
        - ip link set eth4 up
        - ip addr add 10.1.5.4/31 dev eth5
        - ip link set eth5 up
        - ip addr add 10.1.6.4/31 dev eth6
        - ip link set eth6 up
        - ip addr add 10.1.7.4/31 dev eth7
        - ip link set eth7 up
        - ip addr add 10.1.8.4/31 dev eth8
        - ip link set eth8 up
        
        - ip route add default via 10.1.1.5 dev eth1 table 1
        - ip rule add from 10.1.1.4/31 table 1
        - ip route add default via 10.1.2.5 dev eth2 table 2
        - ip rule add from 10.1.2.4/31 table 2
        - ip route add default via 10.1.3.5 dev eth3 table 3
        - ip rule add from 10.1.3.4/31 table 3
        - ip route add default via 10.1.4.5 dev eth4 table 4
        - ip rule add from 10.1.4.4/31 table 4
        - ip route add default via 10.1.5.5 dev eth5 table 5
        - ip rule add from 10.1.5.4/31 table 5
        - ip route add default via 10.1.6.5 dev eth6 table 6
        - ip rule add from 10.1.6.4/31 table 6
        - ip route add default via 10.1.7.5 dev eth7 table 7
        - ip rule add from 10.1.7.4/31 table 7
        - ip route add default via 10.1.8.5 dev eth8 table 8
        - ip rule add from 10.1.8.4/31 table 8

    su2-n4:
      kind: linux
      image: 192.168.2.100:5000/nettool
      exec:
        - ip addr add 10.1.1.6/31 dev eth1
        - ip link set eth1 up
        - ip addr add 10.1.2.6/31 dev eth2
        - ip link set eth2 up
        - ip addr add 10.1.3.6/31 dev eth3
        - ip link set eth3 up
        - ip addr add 10.1.4.6/31 dev eth4
        - ip link set eth4 up
        - ip addr add 10.1.5.6/31 dev eth5
        - ip link set eth5 up
        - ip addr add 10.1.6.6/31 dev eth6
        - ip link set eth6 up
        - ip addr add 10.1.7.6/31 dev eth7
        - ip link set eth7 up
        - ip addr add 10.1.8.6/31 dev eth8
        - ip link set eth8 up
        
        - ip route add default via 10.1.1.7 dev eth1 table 1
        - ip rule add from 10.1.1.6/31 table 1
        - ip route add default via 10.1.2.7 dev eth2 table 2
        - ip rule add from 10.1.2.6/31 table 2
        - ip route add default via 10.1.3.7 dev eth3 table 3
        - ip rule add from 10.1.3.6/31 table 3
        - ip route add default via 10.1.4.7 dev eth4 table 4
        - ip rule add from 10.1.4.6/31 table 4
        - ip route add default via 10.1.5.7 dev eth5 table 5
        - ip rule add from 10.1.5.6/31 table 5
        - ip route add default via 10.1.6.7 dev eth6 table 6
        - ip rule add from 10.1.6.6/31 table 6
        - ip route add default via 10.1.7.7 dev eth7 table 7
        - ip rule add from 10.1.7.6/31 table 7
        - ip route add default via 10.1.8.7 dev eth8 table 8
        - ip rule add from 10.1.8.6/31 table 8

  links:
    # Spine To Leaf
    - endpoints: ["l1:swp1", "s1:swp1"]
    - endpoints: ["l1:swp2", "s2:swp1"]
    - endpoints: ["l1:swp3", "s3:swp1"]
    - endpoints: ["l1:swp4", "s4:swp1"]
    
    - endpoints: ["l2:swp1", "s1:swp2"]
    - endpoints: ["l2:swp2", "s2:swp2"]
    - endpoints: ["l2:swp3", "s3:swp2"]
    - endpoints: ["l2:swp4", "s4:swp2"]
    
    - endpoints: ["l3:swp1", "s1:swp3"]
    - endpoints: ["l3:swp2", "s2:swp3"]
    - endpoints: ["l3:swp3", "s3:swp3"]
    - endpoints: ["l3:swp4", "s4:swp3"]
    
    - endpoints: ["l4:swp1", "s1:swp4"]
    - endpoints: ["l4:swp2", "s2:swp4"]
    - endpoints: ["l4:swp3", "s3:swp4"]
    - endpoints: ["l4:swp4", "s4:swp4"]
                                 
    - endpoints: ["l5:swp1", "s1:swp5"]
    - endpoints: ["l5:swp2", "s2:swp5"]
    - endpoints: ["l5:swp3", "s3:swp5"]
    - endpoints: ["l5:swp4", "s4:swp5"]
                                 
    - endpoints: ["l6:swp1", "s1:swp6"]
    - endpoints: ["l6:swp2", "s2:swp6"]
    - endpoints: ["l6:swp3", "s3:swp6"]
    - endpoints: ["l6:swp4", "s4:swp6"]
                                 
    - endpoints: ["l7:swp1", "s1:swp7"]
    - endpoints: ["l7:swp2", "s2:swp7"]
    - endpoints: ["l7:swp3", "s3:swp7"]
    - endpoints: ["l7:swp4", "s4:swp7"]
                                 
    - endpoints: ["l8:swp1", "s1:swp8"]
    - endpoints: ["l8:swp2", "s2:swp8"]
    - endpoints: ["l8:swp3", "s3:swp8"]
    - endpoints: ["l8:swp4", "s4:swp8"]
    
    # Leaf To Server
    - endpoints: ["su1-n1:eth1", "l1:swp5"]
    - endpoints: ["su1-n1:eth2", "l2:swp5"]
    - endpoints: ["su1-n1:eth3", "l3:swp5"]
    - endpoints: ["su1-n1:eth4", "l4:swp5"]
    - endpoints: ["su1-n1:eth5", "l5:swp5"]
    - endpoints: ["su1-n1:eth6", "l6:swp5"]
    - endpoints: ["su1-n1:eth7", "l7:swp5"]
    - endpoints: ["su1-n1:eth8", "l8:swp5"]
                                     
    - endpoints: ["su1-n2:eth1", "l1:swp6"]
    - endpoints: ["su1-n2:eth2", "l2:swp6"]
    - endpoints: ["su1-n2:eth3", "l3:swp6"]
    - endpoints: ["su1-n2:eth4", "l4:swp6"]
    - endpoints: ["su1-n2:eth5", "l5:swp6"]
    - endpoints: ["su1-n2:eth6", "l6:swp6"]
    - endpoints: ["su1-n2:eth7", "l7:swp6"]
    - endpoints: ["su1-n2:eth8", "l8:swp6"]
                                     
    - endpoints: ["su2-n3:eth1", "l1:swp7"]
    - endpoints: ["su2-n3:eth2", "l2:swp7"]
    - endpoints: ["su2-n3:eth3", "l3:swp7"]
    - endpoints: ["su2-n3:eth4", "l4:swp7"]
    - endpoints: ["su2-n3:eth5", "l5:swp7"]
    - endpoints: ["su2-n3:eth6", "l6:swp7"]
    - endpoints: ["su2-n3:eth7", "l7:swp7"]
    - endpoints: ["su2-n3:eth8", "l8:swp7"]
                                     
    - endpoints: ["su2-n4:eth1", "l1:swp8"]
    - endpoints: ["su2-n4:eth2", "l2:swp8"]
    - endpoints: ["su2-n4:eth3", "l3:swp8"]
    - endpoints: ["su2-n4:eth4", "l4:swp8"]
    - endpoints: ["su2-n4:eth5", "l5:swp8"]
    - endpoints: ["su2-n4:eth6", "l6:swp8"]
    - endpoints: ["su2-n4:eth7", "l7:swp8"]
    - endpoints: ["su2-n4:eth8", "l8:swp8"]


# 1.apply configuration
# for node in l1 l2 l3 l4 l5 l6 l7 l8 s1 s2 s3 s4;do echo "Apply configuration to $node: ";docker exec -it $node bash -c "cat /etc/startup.conf | bash";done 

# 2.server list
# server        rail1--eth1     rail2--eth2     rail3--eth3     rail4--eth4     rail5--eth5     rail6--eth6     rail7--eth7     rail8--eth8
# su1-n1	10.1.1.0/31	10.1.2.0/31	10.1.3.0/31	10.1.4.0/31	10.1.5.0/31	10.1.6.0/31	10.1.7.0/31	10.1.8.0/31
# su1-n2	10.1.1.2/31	10.1.2.2/31	10.1.3.2/31	10.1.4.2/31	10.1.5.2/31	10.1.6.2/31	10.1.7.2/31	10.1.8.2/31
# su2-n3	10.1.1.4/31	10.1.2.4/31	10.1.3.4/31	10.1.4.4/31	10.1.5.4/31	10.1.6.4/31	10.1.7.4/31	10.1.8.4/31
# su2-n4	10.1.1.6/31	10.1.2.6/31	10.1.3.6/31	10.1.4.6/31	10.1.5.6/31	10.1.6.6/31	10.1.7.6/31	10.1.8.6/31

# 3.make a test 
# for src_port in 101 102 103 104 105 106 107 108; do echo "test" | nc -u -s 10.1.1.0 -p $src_port -w 1 10.1.8.6 80 2>/dev/null && echo "$src_port: ok" || echo "$src_port: nok"; done


