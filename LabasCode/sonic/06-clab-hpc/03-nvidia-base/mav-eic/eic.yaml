      sudo sysctl -w "net.ipv4.ip_local_port_range=9000 9799"
      # sudo sysctl -w "net.ipv4.ip_local_port_range=64000 65000"
      ###### To make Program CRITICAL #######
      i=`grep -n "<name>dpMgr</name>" /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 1`; b=`expr $i + 2`; sed -i "${a},${b}s/PGM_CRITICALITY_LEVEL_NONCRITICAL/PGM_CRITICALITY_LEVEL_CRITICAL/g" /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml
      ###############  END  ###############
      touch /home/runcmd.txt
      echo aaa >> /home/runcmd.txt
      mount -o remount,size=8G /dev/shm
      sed -i 's/--ThreadNum=1 --RM=no/--ThreadNum=4 --RM=no/g' /usr/IMS/current/config/xml/mp_system_static_config_data.xml
      sed -i 's/--ThreadNum=1 --RM=no/--ThreadNum=4 --RM=no/g' /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml
      # ipv4 bladeMon mon_ping.sh
