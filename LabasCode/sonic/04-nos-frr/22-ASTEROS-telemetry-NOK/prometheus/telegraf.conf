# 基础配置
[agent]
  interval = "10s"
  flush_interval = "10s"

# Prometheus输出
[[outputs.prometheus_client]]
  listen = ":9273"

# gNMI采集 - SONiC Telemetry
[[inputs.gnmi]]
  [[inputs.gnmi.server]]
    address = "sonic-switch-01:50051"
    username = "admin"
    password = "password"
    
    # 基础接口统计
    [[inputs.gnmi.server.subscription]]
      path = "/interfaces/interface/state/counters"
      subscription_mode = "sample"
      sample_interval = "10s"
    
    # 系统资源
    [[inputs.gnmi.server.subscription]]
      path = "/system/memory/state"
      subscription_mode = "sample"
      sample_interval = "30s"
    
    [[inputs.gnmi.server.subscription]]
      path = "/system/cpu/state"
      subscription_mode = "sample"
      sample_interval = "30s"
