  enabled: true
  entrypoint: /usr/bin/sudo cp -f /data/configmap/ContainerInit.py /usr/IMS/current/tools/;
    /usr/IMS/current/tools/cfginit
  env:
    CPULIMIT: 8
    IN_SERVICE_TIMEOUT: 900
    LOG_STDOUT: enable
    TZ: UTC
    readinessDelay: 120
  extra_user_data:
    config:
      CLOUD_PROFILE_ID: eic_MOAS
      VDU_NAME: eic_VDU_MPVNF
      VNF_ID: eic
      VNF_TYPE: eic_cVNF
      VNFC_NETCONF_IP_TRAFFIC_TYPE: calico
      VNFD_ID: VNFD_eic_MPVNF
      VNFD_VERSION: eic_CNF_V1
    network:
      DB:
        IFNAME: eth2
        MTU: 1500
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: false
        VIRTUAL_LINK_ID: vnfc_vldid_db
      MWMX-E-V4:
        GATEWAY: 172.19.200.129
        IFNAME: fpeth3
        MTU: 1500
        PIP_VIRTUAL_LINK_ID: vnfc_vldid_mwmx-e-mp-pip
        PORTTYPE: DP_PORT_TYPE_MEDIA
        PREFIX: 26
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: true
        VIRTUAL_LINK_ID: vnfc_vldid_mwmx-e-mp
      MWMX-E-V6:
        IFNAME: fpeth6
        MTU: 1500
        PIP_VIRTUAL_LINK_ID: vnfc_vldid_mwmx-e-mp-pip-v6
        PORTTYPE: DP_PORT_TYPE_MEDIA
        PREFIX: 64
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: true
        VIRTUAL_LINK_ID: vnfc_vldid_mwmx-e-mp-v6
      MWMX-I-V4:
        GATEWAY: 172.19.200.129
        IFNAME: fpeth3
        MTU: 1500
        PIP_VIRTUAL_LINK_ID: vnfc_vldid_mwmx-i-mp-pip
        PORTTYPE: DP_PORT_TYPE_MEDIA
        PREFIX: 26
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: true
