        IFNAME: fpeth6
        MTU: 1500
        PIP_VIRTUAL_LINK_ID: vnfc_vldid_mwmx-i-mp-pip-v6
        PORTTYPE: DP_PORT_TYPE_MEDIA
        PREFIX: 64
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: true
        VIRTUAL_LINK_ID: vnfc_vldid_mwmx-i-mp-v6
      RTP:
        IFNAME: fpeth5
        MTU: 1500
        PORTTYPE: DP_PORT_TYPE_MEDIA
        PREFIX: 26
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: true
        VIRTUAL_LINK_ID: vnfc_vldid_mp_rtp
      calico:
        IFNAME: eth0
        TYPE: Ethernet
