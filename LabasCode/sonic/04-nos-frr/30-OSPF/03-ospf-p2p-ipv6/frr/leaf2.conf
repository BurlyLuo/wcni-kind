frr version 10.5.0_git
frr defaults traditional
hostname leaf2
!
interface eth1
 ipv6 address 192:168:2::3/64
 ipv6 ospf6 area 0
 ipv6 ospf6 network point-to-point
exit
!
interface eth2
 ipv6 address 10:1:8::254/64
 ipv6 ospf6 area 0
exit
!
router ospf6
 ospf6 router-id 2.2.2.2
 redistribute connected
exit
!
