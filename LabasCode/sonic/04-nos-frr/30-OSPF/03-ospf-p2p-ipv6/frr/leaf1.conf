frr version 10.5.0_git
frr defaults traditional
hostname leaf1
!
interface eth1
 ipv6 address 192:168:1::1/64
 ipv6 ospf6 area 0
 ipv6 ospf6 network point-to-point
exit
!
interface eth2
 ipv6 address 10:1:5::254/64
 ipv6 ospf6 area 0
exit
!
router ospf6
 ospf6 router-id 1.1.1.1
 redistribute connected
exit
!
