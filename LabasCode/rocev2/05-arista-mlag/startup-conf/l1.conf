hostname l1
service routing protocols model multi-agent
vlan 10
vlan 4094
interface Port-Channel10
   switchport mode trunk
   switchport trunk allowed vlan 10,4094
interface Port-Channel20
   switchport access vlan 10
   mlag 20
interface Ethernet1
   channel-group 10 mode active
interface Ethernet2
   switchport access vlan 10
   channel-group 20 mode active
interface Ethernet3
   channel-group 10 mode active
interface Ethernet4
   channel-group 10 mode active
interface Ethernet5
   no switchport
   ip address 10.0.0.1/31
interface Ethernet6
   no switchport
   ip address 10.0.0.3/31
interface Management0
   ip address 172.20.20.3/24
interface Vlan10
   ip address 10.1.8.2/24
   ip virtual-router address 10.1.8.1
interface Vlan4094
   ip address 1.1.1.1/30
ip routing
ip virtual-router mac-address 00:1c:73:00:00:99
mlag configuration
   domain-id MLAG_LAB
   local-interface Vlan4094
   peer-address 1.1.1.2
   peer-link Port-Channel10
router bgp 65101
   router-id 1.1.1.1
   neighbor PG_SPINES peer group
   neighbor PG_SPINES remote-as 65001
   neighbor 10.0.0.0 peer group PG_SPINES
   neighbor 10.0.0.2 peer group PG_SPINES
   address-family ipv4
      neighbor PG_SPINES activate
      network 10.1.8.0/24

