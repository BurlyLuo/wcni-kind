name: cvx01

topology:
  nodes:
    sw1:
      kind: cumulus_cvx
      image: networkop/cx:4.3.0
      binds:
        - startup-conf/sw1/interfaces:/etc/network/interfaces.d/host-mounts
    sw2:
      kind: linux
      image: quay.io/weiluo/frrouting/frr:10.5.0
      binds:
        - startup-conf/sw2/frr.conf:/etc/frr/frr.conf

  links:
    - endpoints: ["sw1:swp12", "sw2:eth21"]
