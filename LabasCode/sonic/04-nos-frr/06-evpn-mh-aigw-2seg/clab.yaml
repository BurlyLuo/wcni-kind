  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine1:eth3", "leaf3:eth1"]
    - endpoints: ["spine1:eth4", "leaf4:eth1"]

    # Segment A (ES-A): vm1 + vm3 dual-homed to leaf1 + leaf2
    - endpoints: ["leaf1:eth2", "vm1:eth1"]
    - endpoints: ["leaf2:eth2", "vm1:eth2"]
    - endpoints: ["leaf1:eth3", "vm3:eth1"]
    - endpoints: ["leaf2:eth3", "vm3:eth2"]

    # Segment B (ES-B): vm2 + vm4 dual-homed to leaf3 + leaf4
    - endpoints: ["leaf3:eth2", "vm2:eth1"]
    - endpoints: ["leaf4:eth2", "vm2:eth2"]
    - endpoints: ["leaf3:eth3", "vm4:eth1"]
    - endpoints: ["leaf4:eth3", "vm4:eth2"]
