name: cumulus_vx
prefix: ""

topology:
  nodes:
    sw1:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
        - startup-conf/sw1/interfaces:/etc/network/interfaces.d/host-mounts

    sw2:
      kind: cumulus_cvx
      image: networkop/cx:5.3.0
      binds:
        - startup-conf/sw2/interfaces:/etc/network/interfaces.d/host-mounts

  links:
    - endpoints: ["sw1:swp12", "sw2:swp12"]
    - endpoints: ["sw1:swp51", "sw2:swp51"]
