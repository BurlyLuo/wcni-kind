frr version 10.5.0_git
frr defaults traditional
hostname leaf1
!
debug zebra vxlan
debug bgp neighbor-events
debug bgp updates in
debug bgp updates out
!
vrf red
 vni 100
exit-vrf
!

interface bond0
 description ES-A (vm1+vm3) all-active
 evpn mh es-id 1
 evpn mh es-sys-mac 44:38:39:ff:00:01
 evpn mh es-df-pref 500
!

router bgp 64512
 bgp router-id 100.64.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 neighbor 192.168.10.0 remote-as 64612
 !
 address-family ipv4 unicast
  network 100.64.0.1/32
  neighbor 192.168.10.0 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.10.0 activate
  advertise-all-vni
  advertise-svi-ip
  rd 100.64.0.1:1
  route-target import auto
  route-target export auto
 exit-address-family
exit
!
router bgp 64512 vrf red
 bgp router-id 100.64.0.1
 !
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
 exit-address-family
exit
!
