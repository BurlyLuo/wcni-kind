apiVersion: v1
kind: ConfigMap
metadata:
  namespace: eic
  name: gtre-configmap
data:
  user-data: |
    #user-data:
    #
        #mavenirdata:
        network:
          calico:
            TYPE: Ethernet
            IFNAME: eth0
    
  extra_user_data: |
    config:
      CLOUD_PROFILE_ID: eic_MOAS
      VDU_NAME: eic_VDU_GTRE
      VNF_ID: eic
      VNF_TYPE: eic_cVNF
      VNFC_NETCONF_IP_TRAFFIC_TYPE: calico
      VNFD_ID: VNFD_eic_GTRE
      VNFD_VERSION: eic_CNF_V1
    network:
      DB:
        IFNAME: eth2
        MTU: 1500
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: false
        VIRTUAL_LINK_ID: vnfc_vldid_db
      RE-int:
        IFNAME: eth3
        MTU: 1500
        REMOTE_TRAFFIC_TYPE: FE-int
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: false
        VIRTUAL_LINK_ID: vnfc_vldid_RE-int
      calico:
        IFNAME: eth0
        TYPE: Ethernet
      emxrouter:
        IFNAME: eth1
        MTU: 1500
        TYPE: Ethernet
        VIRTUAL_IP_REQUIRED: false
        VIRTUAL_LINK_ID: vnfc_vldid_emxrouter
    runcmd: |
      #!/bin/bash
      #Commands to be executed.
      ###To remove unwanted programs from static xml start####
      i=`grep -n "<fkprogram>h248Mgr</fkprogram>" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 3`; b=`expr $i + 1`; sed -i "${a},${b}d" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml
      i=`grep -n "<fkprogram>h248ConnMgr</fkprogram>" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 3`; b=`expr $i + 1`; sed -i "${a},${b}d" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml
      i=`grep -n "<fkprogram>liDbMgr</fkprogram>" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 3`; b=`expr $i + 1`; sed -i "${a},${b}d" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml
      i=`grep -n "<fkprogram>tlsCertExpMon </fkprogram>" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 3`; b=`expr $i + 1`; sed -i "${a},${b}d" /opt/confd/confdInstallDir/var/confd/cdb/gtre_system_static_config_data.xml
      file=/opt/confd/confdInstallDir/var/confd/cdb/*system_static_config_data.xml
      line_userData=$(grep -n "<mapName>webSrvMgr</mapName>" $file |cut -d ":" -f 1)
      echo $line_userData > /tmp/sw_program_bak
      if [[ -n "$line_userData" ]];then
        line1=$[line_userData-1]
        line2=$[line_userData+3]
        echo $line1 >> /tmp/sw_program_bak
        echo $line2 >> /tmp/sw_program_bak
        sed -n "$line1,$line2 p" $file >> /tmp/sw_program_bak
        sed -i "$line1,$line2 d" $file
      fi
      ############END################
      touch /home/runcmd.txt
      echo aaa >> /home/runcmd.txt
      #sed -i "s/SYSTEM_READY=\"Yes\"/SYSTEM_READY=\"No\"/g"   /usr/IMS/exports/blade.cfg
      sed -i  "s/^TMOUT=/#TMOUT=/g" /etc/profile
      grep ^"PermitRootLogin no" /etc/ssh/sshd_config|sed -i "s/^PermitRootLogin no/#PermitRootLogin no/g" /etc/ssh/sshd_config
      sed -i  "s/^readonly TMOUT/#readonly TMOUT/g" /etc/profile
      sed -i  "s/^export TMOUT/#export TMOUT/g" /etc/profile
      grep ^"ClientAlive" /etc/ssh/sshd_config|sed -i "s/^ClientAlive/#ClientAlive/g" /etc/ssh/sshd_config
      #sed -i "s/KILL_SECONDS=300/KILL_SECONDS=1800/g" /etc/init.d/IMS
      echo 'mavenir' | passwd --stdin root
      echo 'mavenir' | passwd --stdin mavadmin
      echo 'mavenir' | passwd --stdin mavcli
      echo "======================"
      sed -i "/<netconfTraceLog>/{n;s/<enabled>false<\/enabled>/<enabled>true<\/enabled>/g}" /opt/confd/confdInstallDir/var/confd/cdb/confd_dyncfg_init.xml
      grep mavenir1 /etc/passwd ||useradd  mavenir1
      echo 'mavenir1' | passwd --stdin mavenir1
      grep mavenir1 /etc/sudoers ||echo 'mavenir1 ALL=(ALL) ALL' >> /etc/sudoers
      echo "======================"
      rm -f /root/.vimrc
      echo "set ic" >> /root/.vimrc
      echo "set nu" >> /root/.vimrc
      sed -i "s/debug: false/debug: true/g" /etc/etcd/etcd.conf
      rm -f /usr/local/bin/showvnf
      cat > /usr/local/bin/showvnf << EOF
      readShm;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      readShm -v -o;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      readShm -s;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      echo -e "'set screen length 2000'\n'show table sys platform peer_vnf'"|xargs -n1 echo | cli;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      echo -e "'set screen length 2000'\n'show table sys platform peer_ip'"|xargs -n1 echo | cli;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      echo -e "'set screen length 2000'\n'show table sys sm lvnStatePolicy'"|xargs -n1 echo | cli;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      echo -e "'set screen length 2000'\n'show table sys sm vnfcDependency'"|xargs -n1 echo | cli;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      echo -e "'set screen length 2000'\n'show table sys sm service_grp'"|xargs -n1 echo | cli;
      echo -e '\a';
      echo '*******************';
      echo -e '\a';
      EOF
      chmod +x /usr/local/bin/showvnf
      rm -f /usr/local/bin/etcdget
      cat > /usr/local/bin/etcdget << EOF
      etcdctl --prefix=true get \$1
      EOF
      chmod +x /usr/local/bin/etcdget
      rm -f /usr/local/bin/etcdgetall
      cat > /usr/local/bin/etcdgetall << EOF
      etcdctl get A z
      EOF
      chmod +x /usr/local/bin/etcdgetall
      rm -f /usr/local/bin/logdelcoredel
      cat > /usr/local/bin/logdelcoredel << EOF
      rm -f /data/storage/log/*.gz;
      rm -f /data/storage/log/*.txt;
      rm -f /data/storage/log/*.log;
      rm -f /data/storage/corefiles/core.*;
      rm -rf /data/storage/log/confdLogs/*;
      EOF
      chmod +x /usr/local/bin/logdelcoredel
      rm -f /usr/local/bin/stopims_cleandoorbell
      cat > /usr/local/bin/stopims_cleandoorbell << EOF
      killall -10 pm;
      killall -9 mlogc;
      killall -9 mlogd;
      killall -9 AppMon;
      killall -9 cleanupLogFiles.sh;
      killall -9 IMS;
      killall -9 confd;
      service etcd stop;
      rm -f /var/run/mavenir/doorbell.status;
      rm -f /data/storage/log/*.gz;
      rm -f /data/storage/log/*.txt;
      rm -f /data/storage/log/*.log;
      rm -f /data/storage/corefiles/core.*;
      rm -rf /data/storage/log/confdLogs/*;
      sleep 5;
      ps -ef | grep /usr/IMS/current/bin/;
      EOF
      chmod +x /usr/local/bin/stopims_cleandoorbell
      rm -f /usr/local/bin/startconfd-manually
      cat > /usr/local/bin/startconfd-manually << EOF
      /opt/confd/confdInstallDir/bin/confd -c \
      /opt/confd/confdInstallDir/etc/confd/confd.conf \
      --addloadpath /opt/confd/confdInstallDir/etc/confd/ \
      --addloadpath /opt/confd/confdInstallDir/src/confd/dyncfg/ \
      --addloadpath /usr/IMS/current/yangFiles \
      --addloadpath /usr/IMS/current/sysYangFiles --ignore-initial-validation
      EOF
      chmod +x /usr/local/bin/startconfd-manually
      rm -f /usr/local/bin/daohong_ipcrm
      touch /usr/local/bin/daohong_ipcrm
      echo  "# Clean up msg Q and share memory" >> /usr/local/bin/daohong_ipcrm
      echo -e "for a in \`ipcs -m|awk '\$1 ~ /0x/ {print \$2}'\`; do ipcrm -m \$a; done" >> /usr/local/bin/daohong_ipcrm
      echo -e "for a in \`ipcs -q|awk '\$1 ~ /0x/ {print \$2}'\`; do ipcrm -q \$a; done" >> /usr/local/bin/daohong_ipcrm
      chmod +x /usr/local/bin/daohong_ipcrm
      rm -f /usr/local/bin/imsps
      cat > /usr/local/bin/imsps << EOF
      ps -ef | grep /usr/IMS/current/;
      ipcs;
      readShm;
      ps -ef | grep warm;
      EOF
      chmod +x /usr/local/bin/imsps
      echo "======================"
      rm -f /usr/local/bin/checkcore.sh
      cat > /usr/local/bin/checkcore.sh << EOF
      #!/bin/bash
      count_f=\`ls /data/storage/corefiles/ | wc -w\`
      if [ \$count_f == 0 ];then
        echo > /tmp/checkcore.log
      else
        newcorefile=\`ls -lrt /data/storage/corefiles/ | tail -1 | awk '{print \$9}'\`
        if [ -f /tmp/checkcore.log ];then
          oldcorefile=\`head -1 /tmp/checkcore.log\`
          if [ \$oldcorefile == \$newcorefile ];then
            echo ""
          else
            echo \$newcorefile > /tmp/checkcore.log
            wall "Core occured!!! core dump file is: \$newcorefile"
          fi
        else
          echo \$newcorefile > /tmp/checkcore.log
          wall "Core occured!!! core dump file is: \$newcorefile"
        fi
      fi
      EOF
      chmod +x /usr/local/bin/checkcore.sh
      grep checkcore /etc/crontab || echo -e "*/1  *  *  *  *  root  /usr/local/bin/checkcore.sh" >> /etc/crontab
      echo "======================"
      # cd /usr/bin/;ls -ltr /usr/bin/|grep rz||wget http://10.1.1.14/mavenir/SystemTest/MMX/rzsz-rhel72/rz;chmod +x /usr/bin/rz
      # cd /usr/bin/;ls -ltr /usr/bin/|grep sz||wget http://10.1.1.14/mavenir/SystemTest/MMX/rzsz-rhel72/sz;chmod +x /usr/bin/sz
      ls -lhr /root/|grep ^logs||mkdir -p /root/logs;
      rm -f /root/logs/start_log.sh
      cat > /root/logs/start_log.sh << EOF
      #!/bin/bash
      rm -f *.log *.tgz *.pcap *.tar.gz *.txz
      echo "====== Start capturing \`hostname\` logs ======"
      nohup tcpdump -i any -s 0 -w /tmp/\`hostname\`-\`date +"%m%d%H%M"\`.pcap>/dev/null  2>&1 &
      nohup /usr/IMS/current/bin/mlogc  -c 127.0.0.1 -l DBG  |tee -a /tmp/\`hostname\`-\`date +"%m%d%H%M"\`.log >/dev/null  2>&1 &
      EOF
      chmod +x /root/logs/start_log.sh
      echo "======================"
      rm -f /root/logs/stop_log.sh
      cat > /root/logs/stop_log.sh << EOF
      #!/bin/bash
      echo "====== Stop capturing \`hostname\` logs ======";date
      echo \$1
      if [ "\$1" == "1" ]; then
      mkdir -p \$2
      killall -9  tcpdump
      killall -9  mlogc
      cp /tmp/\`hostname\`* \$2
      rm -rf /tmp/\`hostname\`*
      tar Jvcf "\$2".txz   \$2;
      # sz "\$2".txz;
      fi
      EOF
      chmod +x /root/logs/stop_log.sh
      echo "======================"
      grep ^Banner /etc/ssh/sshd_config|sed -i "s/^Banner/#Banner/g" /etc/ssh/sshd_config
      service sshd restart
      echo "======================"
      #########==UAG_IT_ADD#########
      sed -i "s/<systemSecurity>//g"  /usr/IMS/current/config/xml/*.xml
      sed -i "s/<systemSecurity>//g"  /opt/confd/confdInstallDir/var/confd/cdb/*.xml
      sed -i s@"</systemSecurity>"@@g  /usr/IMS/current/config/xml/*.xml
      sed -i s@"</systemSecurity>"@@g  /opt/confd/confdInstallDir/var/confd/cdb/*.xml
      sed -i s@"<level>SECURITY_NON_ROOT</level>"@@g  /usr/IMS/current/config/xml/*.xml
      sed -i s@"<level>SECURITY_NON_ROOT</level>"@@g  /opt/confd/confdInstallDir/var/confd/cdb/*.xml
      bash /config/cfg_rsyslogd.sh
      bash /config/cfg_sysctl.sh
      echo "-----------------------"
    vdu:
      PROGRAM_SECURITY: false
      TIMEZONE: UTC
      security: null
      vnf-type:
        service-type: gtre
