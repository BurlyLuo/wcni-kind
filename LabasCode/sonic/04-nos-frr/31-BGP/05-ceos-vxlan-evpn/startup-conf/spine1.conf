! Command: show running-config
! device: spine1 (cEOSLab, EOS-4.28.4M-29408825.4284M (engineering build))
!
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$lRTDlGFYnzLC1rmF$PFaKYq/xGcu3Zwsqtu.9HsYec6mnxAYr1BwLjJDkg0B2oStoCTonDBsd4Nl.4aKIRuUr2qnR0XlbjeONZLRR30
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname spine1
!
spanning-tree mode mstp
!
management api http-commands
   no shutdown
!
management api gnmi
   transport grpc default
!
management api netconf
   transport ssh default
!
interface Ethernet1
   description TO_LEAF01
   no switchport
   ip address 10.1.1.0/31
!
interface Ethernet2
   description TO_LEAF02
   no switchport
   ip address 10.1.1.2/31
!
interface Management0
   ip address 172.20.20.6/24
   ipv6 address 3fff:172:20:20::6/64
!
ip routing
!
ip route 0.0.0.0/0 172.20.20.1
!
ipv6 route ::/0 3fff:172:20:20::1
!
router bgp 65001
   router-id 10.10.100.1
   maximum-paths 4 ecmp 4
   neighbor LEAF_GROUP peer group
   neighbor LEAF_GROUP allowas-in 1
   neighbor LEAF_GROUP ebgp-multihop 4
   neighbor LEAF_GROUP send-community extended
   neighbor LEAF_GROUP maximum-routes 12000
   neighbor 10.1.1.1 peer group LEAF_GROUP
   neighbor 10.1.1.1 remote-as 65101
   neighbor 10.1.1.3 peer group LEAF_GROUP
   neighbor 10.1.1.3 remote-as 65102
   !
   address-family ipv4
      neighbor 10.1.1.1 activate
      neighbor 10.1.1.3 activate
!
end
