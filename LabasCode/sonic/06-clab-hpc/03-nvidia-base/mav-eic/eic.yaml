      line1=$(grep -nw '"network is not reachable, $IPADDRESS is not pingable"' /usr/IMS/current/bin/mon_ping.sh | awk -F ":" '{print $1}')
      echo -e "\techo \"return value not 0, \$pingResult\" >>/data/storage/log/blade_mon_shell.log" | sed -i "${line1}r /dev/stdin" /usr/IMS/current/bin/mon_ping.sh
      line2=$(grep -nw '"address $IPADDRESS is not pingable"' /usr/IMS/current/bin/mon_ping.sh | awk -F ":" '{print $1}')
      echo -e "\techo \$pingResult >>/data/storage/log/blade_mon_shell.log" | sed -i "${line2}r /dev/stdin" /usr/IMS/current/bin/mon_ping.sh
      # ipv6 bladeMon mon_ping6.sh
      sed -i 's/-W 1/-W 2/g' /usr/IMS/current/bin/mon_ping6.sh
      line1=$(grep -nw '"network is not reachable, $IPADDRESS is not pingable"' /usr/IMS/current/bin/mon_ping6.sh | awk -F ":" '{print $1}')
      echo -e "\techo \"return value not 0, \$pingResult\" >>/data/storage/log/blade_mon_shell.log" | sed -i "${line1}r /dev/stdin" /usr/IMS/current/bin/mon_ping6.sh
      line2=$(grep -nw '"address $IPADDRESS is not pingable"' /usr/IMS/current/bin/mon_ping6.sh | awk -F ":" '{print $1}')
      echo -e "\techo \$pingResult >>/data/storage/log/blade_mon_shell.log" | sed -i "${line2}r /dev/stdin" /usr/IMS/current/bin/mon_ping6.sh
      ###To remove unwanted programs from static xml start####
      i=`grep -n "<fkprogram>liDbMgr</fkprogram>" /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 3`; b=`expr $i + 1`; sed -i "${a},${b}d" /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml
      i=`grep -n "<fkprogram>tlsCertExpMon</fkprogram>" /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml | awk -F":" '{ print $1 }'`; a=`expr $i - 3`; b=`expr $i + 1`; sed -i "${a},${b}d" /opt/confd/confdInstallDir/var/confd/cdb/mp_system_static_config_data.xml
    vdu:
      HOSTNAME: true
      PROGRAM_SECURITY: false
      TIMEZONE: UTC
      security: null
