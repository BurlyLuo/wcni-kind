name: evpn-mh-aigw-2seg

topology:
  nodes:
    spine1:
      kind: linux
      image: quay.io/weiluo/frrouting/frr:10.5.0
      cmd: sh -c "sed -i 's/bgpd=no/bgpd=yes/;s/zebra=no/zebra=yes/' /etc/frr/daemons && /usr/lib/frr/docker-start"
      binds:
        - /lib/modules:/lib/modules
        - ./frr/spine1.conf:/etc/frr/frr.conf
      exec:
        - bash -c "echo 'PS1=\"[\\u@\\h]\\$ \"' > /root/.bashrc"
        - touch /etc/frr/vtysh.conf
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 100.65.0.254/32 dev lo
        - ip addr add 192.168.10.0/31 dev eth1
        - ip addr add 192.168.10.2/31 dev eth2
        - ip addr add 192.168.10.4/31 dev eth3
        - ip addr add 192.168.10.6/31 dev eth4

