frr version 10.5.0_git
frr defaults traditional
hostname spine
!
interface eth1
 ipv6 address 192:168:1::4/64
 ipv6 ospf6 area 0
 ipv6 ospf6 network point-to-point
exit
!
interface eth2
 ipv6 address 192:168:2::2/64
 ipv6 ospf6 area 0
 ipv6 ospf6 network point-to-point
exit
!
router ospf6
 ospf6 router-id 3.3.3.3
exit
!
